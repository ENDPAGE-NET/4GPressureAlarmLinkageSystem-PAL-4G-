# PAL_4G Nginx 配置模板
# 宝塔面板：网站设置 -> 配置文件 中粘贴以下内容
# 注意替换域名和证书路径为实际值

server {
    listen 80;
    server_name usr-iot.endpage.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name usr-iot.endpage.net;

    # 宝塔 SSL 证书路径（在宝塔面板 -> SSL 中配置后自动生成）
    ssl_certificate /www/server/panel/vhost/cert/usr-iot.endpage.net/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/usr-iot.endpage.net/privkey.pem;

    # Web 前端静态文件
    root /www/wwwroot/pal4g/web/dist;
    index index.html;

    client_max_body_size 20m;

    # Vue SPA 路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 反代
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket 反代
    location /api/v1/ws/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
